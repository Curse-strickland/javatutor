<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壁纸生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #6366f1;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .control-group {
            background: #2b2b32;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #909098;
        }
        
        input[type="color"],
        input[type="range"],
        select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: #33333b;
            color: #fff;
        }
        
        input[type="range"] {
            padding: 0;
            height: 6px;
        }
        
        .preview {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(180deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .value-display {
            display: inline-block;
            margin-left: 10px;
            color: #6366f1;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 壁纸生成器</h1>
        
        <div class="controls">
            <div class="control-group">
                <label>背景类型</label>
                <select id="bgType">
                    <option value="gradient">渐变</option>
                    <option value="radial">径向渐变</option>
                    <option value="pattern">图案</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>主颜色</label>
                <input type="color" id="color1" value="#6366f1">
            </div>
            
            <div class="control-group">
                <label>次要颜色</label>
                <input type="color" id="color2" value="#8b5cf6">
            </div>
            
            <div class="control-group">
                <label>透明度 <span class="value-display" id="opacityValue">15%</span></label>
                <input type="range" id="opacity" min="5" max="50" value="15">
            </div>
            
            <div class="control-group">
                <label>角度/位置</label>
                <input type="range" id="angle" min="0" max="360" value="135">
            </div>
        </div>
        
        <div class="preview" id="preview"></div>
        
        <div class="buttons">
            <button onclick="downloadWallpaper()">下载壁纸 (1920x1080)</button>
            <button onclick="randomize()" style="background: linear-gradient(180deg, #ec4899 0%, #db2777 100%);">随机生成</button>
        </div>
    </div>
    
    <canvas id="canvas" width="1920" height="1080" style="display:none;"></canvas>
    
    <script>
        const preview = document.getElementById('preview');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
        
        function updatePreview() {
            const bgType = document.getElementById('bgType').value;
            const color1 = document.getElementById('color1').value;
            const color2 = document.getElementById('color2').value;
            const opacity = document.getElementById('opacity').value / 100;
            const angle = document.getElementById('angle').value;
            
            document.getElementById('opacityValue').textContent = Math.round(opacity * 100) + '%';
            
            let background = '';
            
            if (bgType === 'gradient') {
                background = `linear-gradient(${angle}deg, ${hexToRgba(color1, opacity)}, ${hexToRgba(color2, opacity)})`;
            } else if (bgType === 'radial') {
                background = `radial-gradient(circle at 50% 50%, ${hexToRgba(color1, opacity)} 0%, ${hexToRgba(color2, opacity * 0.5)} 50%, transparent 70%)`;
            } else if (bgType === 'pattern') {
                background = `
                    radial-gradient(circle at 20% 80%, ${hexToRgba(color1, opacity)} 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, ${hexToRgba(color2, opacity * 0.7)} 0%, transparent 50%)
                `;
            }
            
            preview.style.background = '#2b2b32';
            preview.style.backgroundImage = background;
        }
        
        function downloadWallpaper() {
            const bgType = document.getElementById('bgType').value;
            const color1 = document.getElementById('color1').value;
            const color2 = document.getElementById('color2').value;
            const opacity = document.getElementById('opacity').value / 100;
            const angle = document.getElementById('angle').value;
            
            // 清除画布
            ctx.fillStyle = '#2b2b32';
            ctx.fillRect(0, 0, 1920, 1080);
            
            if (bgType === 'gradient') {
                const gradient = ctx.createLinearGradient(
                    0, 0,
                    1920 * Math.cos(angle * Math.PI / 180),
                    1080 * Math.sin(angle * Math.PI / 180)
                );
                gradient.addColorStop(0, hexToRgba(color1, opacity));
                gradient.addColorStop(1, hexToRgba(color2, opacity));
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 1920, 1080);
            } else if (bgType === 'radial') {
                const gradient = ctx.createRadialGradient(960, 540, 0, 960, 540, 800);
                gradient.addColorStop(0, hexToRgba(color1, opacity));
                gradient.addColorStop(0.5, hexToRgba(color2, opacity * 0.5));
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 1920, 1080);
            } else if (bgType === 'pattern') {
                const gradient1 = ctx.createRadialGradient(384, 864, 0, 384, 864, 500);
                gradient1.addColorStop(0, hexToRgba(color1, opacity));
                gradient1.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient1;
                ctx.fillRect(0, 0, 1920, 1080);
                
                const gradient2 = ctx.createRadialGradient(1536, 216, 0, 1536, 216, 500);
                gradient2.addColorStop(0, hexToRgba(color2, opacity * 0.7));
                gradient2.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient2;
                ctx.fillRect(0, 0, 1920, 1080);
            }
            
            // 下载
            const link = document.createElement('a');
            link.download = `wallpaper-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        function randomize() {
            const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#0a84ff', '#10b981', '#f59e0b', '#ef4444'];
            document.getElementById('color1').value = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('color2').value = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('opacity').value = Math.floor(Math.random() * 30) + 5;
            document.getElementById('angle').value = Math.floor(Math.random() * 360);
            updatePreview();
        }
        
        // 监听所有输入变化
        document.querySelectorAll('input, select').forEach(input => {
            input.addEventListener('input', updatePreview);
        });
        
        // 初始化
        updatePreview();
    </script>
</body>
</html>
